<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AI Music Studio{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020617;
      --bg-2: #0b1222;
      --panel: rgba(15, 23, 42, 0.82);
      --border: rgba(59, 130, 246, 0.22);
      --text: #f8fafc;
      --muted: #93a4be;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      background:
        radial-gradient(circle at 70% -20%, rgba(29, 78, 216, 0.45), transparent 45%),
        radial-gradient(circle at 15% 120%, rgba(37, 99, 235, 0.35), transparent 35%),
        var(--bg);
      min-height: 100vh;
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(2, 6, 23, 0.55);
      backdrop-filter: blur(6px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .brand svg { color: #3b82f6; }
    .links {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn, .btn-ghost {
      border-radius: 9px;
      padding: 8px 14px;
      border: 1px solid transparent;
      color: white;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }
    .btn { background: var(--primary); }
    .btn:hover { background: var(--primary-2); }
    .btn-ghost { background: rgba(15, 23, 42, 0.75); border-color: rgba(148, 163, 184, 0.2); }
    .btn-ghost:hover { border-color: rgba(148, 163, 184, 0.4); }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
    }
    input, select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 9px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      background: var(--bg-2);
      color: var(--text);
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.28);
    }
    .label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .notice {
      margin-top: 14px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      display: none;
    }
    .notice.show { display: block; }
    .ok { background: rgba(34, 197, 94, 0.14); border: 1px solid rgba(34, 197, 94, 0.35); }
    .err { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.35); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      AI Music Studio
    </a>
    <div class="links" id="nav-links"></div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    function getCookie(name) {
      const v = document.cookie.split(";").map((c) => c.trim());
      for (const c of v) {
        if (c.startsWith(name + "=")) return decodeURIComponent(c.slice(name.length + 1));
      }
      return null;
    }
    function csrfHeaders() {
      const token = getCookie("csrftoken");
      const h = { "Content-Type": "application/json" };
      if (token) h["X-CSRFToken"] = token;
      return h;
    }
    function getCurrentUser() {
      try { return JSON.parse(localStorage.getItem("currentUser") || "null"); } catch { return null; }
    }
    function setCurrentUser(user) {
      localStorage.setItem("currentUser", JSON.stringify(user));
    }
    function clearCurrentUser() {
      localStorage.removeItem("currentUser");
    }
    async function refreshCurrentUserFromSession() {
      try {
        const res = await fetch("/api/user/auth/me/", {
          credentials: "same-origin"
        });
        if (!res.ok) {
          clearCurrentUser();
          return null;
        }
        const data = await res.json();
        setCurrentUser(data);
        return data;
      } catch (err) {
        // If network fails, keep local fallback so UI still functions.
        return getCurrentUser();
      }
    }
    async function requireAuthUser() {
      const user = await refreshCurrentUserFromSession();
      if (!user || !user.id) {
        window.location.href = "/signin/";
        return null;
      }
      return user;
    }
    function buildNav() {
      const root = document.getElementById("nav-links");
      if (!root) return;
      const user = getCurrentUser();
      if (user && user.id) {
        root.innerHTML = '<a class="btn-ghost" href="/generate-ai-music/">Generate</a><a class="btn-ghost" href="/my-songs/">My Songs</a><button class="btn-ghost" id="logout-btn">Logout</button>';
        const btn = document.getElementById("logout-btn");
        btn.addEventListener("click", async function () {
          try {
            await fetch("/api/user/auth/signout/", {
              method: "POST",
              credentials: "same-origin",
              headers: csrfHeaders()
            });
          } catch (err) {
            // Still clear local state even if signout request fails.
          }
          clearCurrentUser();
          window.location.href = "/signin/";
        });
      } else {
        root.innerHTML = '<a class="btn-ghost" href="/signin/">Sign In</a><a class="btn" href="/signup/">Get Started</a>';
      }
    }
    refreshCurrentUserFromSession().finally(buildNav);
  </script>
  {% block page_script %}{% endblock %}
</body>
</html>
