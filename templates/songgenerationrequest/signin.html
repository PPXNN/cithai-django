{% extends "songgenerationrequest/base.html" %}
{% block title %}Sign In - AI Music Studio{% endblock %}
{% block content %}
<section style="max-width:460px; margin:30px auto;">
  <div class="card" style="padding:28px;">
    <h1 style="margin:0 0 6px; font-size:34px;">AI Music Studio</h1>
    <p style="margin:0 0 20px; color:#95a9c3;">Generate unique music with AI</p>
    <form id="signin-form">
      <label class="label" for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="your_username" required />
      <div style="height:12px;"></div>
      <label class="label" for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="••••••••" required />
      <button class="btn" style="width:100%; margin-top:16px; padding:11px 14px;" type="submit">Sign In</button>
      <div id="notice" class="notice"></div>
    </form>
    <p style="margin:18px 0 0; color:#95a9c3;">Don't have an account? <a href="/signup/" style="color:#60a5fa;">Sign up</a></p>
  </div>
</section>
{% endblock %}
{% block page_script %}
<script>
  (function () {
    const form = document.getElementById("signin-form");
    const notice = document.getElementById("notice");
    function show(msg, ok) {
      notice.textContent = msg;
      notice.className = "notice show " + (ok ? "ok" : "err");
    }
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const r = await fetch("/api/user/auth/signin/", {
          method: "POST",
          credentials: "same-origin",
          headers: csrfHeaders(),
          body: JSON.stringify({ username: username, password: password })
        });
        const data = await r.json();
        if (!r.ok) {
          show("Sign in failed: " + (data.detail || JSON.stringify(data)), false);
          return;
        }
        setCurrentUser(data);
        show("Signed in successfully. Redirecting to Generate...", true);
        setTimeout(function () { window.location.href = "/generate-ai-music/"; }, 500);
      } catch (err) {
        show("An error occurred: " + err, false);
      }
    });
  })();
</script>
{% endblock %}
