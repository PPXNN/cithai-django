{% extends "songgenerationrequest/base.html" %}
{% block title %}Generate AI Music - AI Music Studio{% endblock %}
{% block content %}
<section style="max-width:560px; margin:12px auto;">
  <div style="text-align:center; margin-bottom:16px;">
    <h1 style="margin:0 0 6px;">Generate AI Music</h1>
    <p style="margin:0; color:#95a9c3;">Create unique songs with artificial intelligence</p>
  </div>
  <form class="card" id="gen-form" style="padding:24px;">
    <label class="label" for="title">Song title</label>
    <input id="title" name="title" type="text" maxlength="50" value="My Amazing Song" required />
    <div style="height:12px;"></div>

    <label class="label" for="occasion">Occasion</label>
    <select id="occasion" name="occasion">
      {% for value, label in occasion_choices %}
      <option value="{{ value }}"{% if value == "other" %} selected{% endif %}>{{ label|title }}</option>
      {% endfor %}
    </select>
    <div style="height:12px;"></div>

    <label class="label" for="genre">Genre</label>
    <select id="genre" name="genre">
      {% for value, label in genre_choices %}
      <option value="{{ value }}"{% if value == "pop" %} selected{% endif %}>{{ label|title }}</option>
      {% endfor %}
    </select>
    <div style="height:12px;"></div>

    <label class="label" for="mood">Mood</label>
    <select id="mood" name="mood">
      {% for value, label in mood_choices %}
      <option value="{{ value }}"{% if value == "happy" %} selected{% endif %}>{{ label|title }}</option>
      {% endfor %}
    </select>
    <div style="height:12px;"></div>

    <label class="label" for="voice_type">Voice type</label>
    <select id="voice_type" name="voice_type">
      {% for value, label in voice_choices %}
      <option value="{{ value }}"{% if value == "male" %} selected{% endif %}>{{ label|title }}</option>
      {% endfor %}
    </select>
    <div style="height:16px;"></div>

    <button class="btn" id="submit-btn" type="submit" style="margin-top:16px; width:100%; padding:11px 14px;">Generate Song</button>
    <div id="notice" class="notice"></div>
  </form>
</section>
{% endblock %}
{% block page_script %}
<script>
  (function () {
    const form = document.getElementById("gen-form");
    const submitBtn = document.getElementById("submit-btn");
    const notice = document.getElementById("notice");
    function show(msg, ok) {
      notice.textContent = msg;
      notice.className = "notice show " + (ok ? "ok" : "err");
    }
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      const user = await requireAuthUser();
      if (!user) return;
      submitBtn.disabled = true;
      const payload = {
        title: document.getElementById("title").value.trim(),
        occasion: document.getElementById("occasion").value,
        genre: document.getElementById("genre").value,
        mood: document.getElementById("mood").value,
        voice_type: document.getElementById("voice_type").value,
        estimated_duration: 60
      };
      try {
        const createRes = await fetch("/api/song-generation-requests/", {
          method: "POST",
          credentials: "same-origin",
          headers: csrfHeaders(),
          body: JSON.stringify(payload)
        });
        const createData = await createRes.json();
        if (!createRes.ok) {
          show("Request failed: " + JSON.stringify(createData), false);
          submitBtn.disabled = false;
          return;
        }
        if (!createData.taskId) {
          show("Request created, but taskId is missing.", false);
          submitBtn.disabled = false;
          return;
        }
        const taskId = createData.taskId;
        addPendingGenerationTask(taskId, user.id);
        show("Generating... taskId: " + taskId, true);

        const startedAt = Date.now();
        const timeoutMs = 120000; // 2 minutes
        const intervalMs = 2500;

        async function pollOnce() {
          const statusRes = await fetch("/api/song-generation-requests/status/" + taskId + "/" + user.id, {
            credentials: "same-origin"
          });
          const statusData = await statusRes.json();
          if (!statusRes.ok) {
            throw new Error("Status check failed: " + JSON.stringify(statusData));
          }
          const envelope = statusData || {};
          const data = envelope.data || {};
          const s = data.status || envelope.status || "PENDING";
          return { status: String(s).toUpperCase(), raw: statusData };
        }

        while (true) {
          if (Date.now() - startedAt > timeoutMs) {
            show("Still generating. Please check again later in My Songs.", false);
            break;
          }
          let polled;
          try {
            polled = await pollOnce();
          } catch (err) {
            show(String(err), false);
            break;
          }

          if (polled.status === "SUCCESS") {
            removePendingGenerationTask(taskId, user.id);
            show("Song created. Redirecting to My Songs...", true);
            setTimeout(function () { window.location.href = "/my-songs/"; }, 700);
            break;
          }
          if (polled.status === "FAILED") {
            removePendingGenerationTask(taskId, user.id);
            show("Generation failed: " + JSON.stringify(polled.raw), false);
            break;
          }
          show("Generating... (" + polled.status + ")", true);
          await new Promise(function (r) { setTimeout(r, intervalMs); });
        }
      } catch (err) {
        show("An error occurred: " + err, false);
      } finally {
        submitBtn.disabled = false;
      }
    });
    requireAuthUser();
  })();
</script>
{% endblock %}
